<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <!-- Metadados básicos da página -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calcuadora</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Conteúdo principal da calculadora -->
    <section class="sessao-calculadora">
        <h1 class="Titulo_nome"> Cayke Cardoso Cauculadora Web </h1>
        <!-- Card principal da interface -->
        <div class="container-calcuadora">
            <!-- Campo onde a expressão e o resultado aparecem -->
            <input class="Barra-de-calculo" type="text" placeholder="Digite uma operação " alt="barra de calculo " id="Barra">
            <!-- Grade dos botões da calculadora -->
            <div class="numeros">
                <button onclick="limpar()">C</button>
                  <button onclick="apagar()">&lt;</button>
                  <button onclick="inserir('/')">/</button>
                <button onclick="inserir('*')">*</button>
                  <button onclick="inserir('7')">7</button>
                  <button onclick="inserir('8')">8</button>
                  <button onclick="inserir('9')">9</button>
                  <button onclick="inserir('-')">-</button>
                  <button onclick="inserir('4')">4</button>
                  <button onclick="inserir('5')">5</button>
                  <button onclick="inserir('6')">6</button>
                  <button onclick="inserir('+')">+</button>
                  <button onclick="inserir('1')">1</button>
                  <button onclick="inserir('2')">2</button>
                  <button onclick="inserir('3')">3</button>
                  <button onclick="resultado()" class="btn-igual">=</button>
                  <button onclick="inserir('0')" class="btn-zero">0</button>
                  <button onclick="inserir('.')">.</button>
                  <button onclick ="inserir(',')">,</button>
            </div>
        </div>
    </section>
    <!-- Script responsável pelas ações da calculadora -->
    <script src="index.js"></script>
</body>

</html>
