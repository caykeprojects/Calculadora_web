<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calcuadora</title>
</head>
<link rel="stylesheet" href="style.css">

<body>
    <section class="sessao-calculadora">
        <h1 class="Titulo_nome"> Cayke Cardoso </h1>
        <div class="container-calcuadora">
            <input class="Barra-de-calculo" type="text" placeholder="Digite um numero " alt="barra de calculo ">
            <div class="numeros">
                  <button>C</button>
                  <button>&lt;</button>
                  <button>/</button>
                  <button>*</button>
                  <button>7</button>
                  <button>8</button>
                  <button>9</button>
                  <button>-</button>
                  <button>4</button>
                  <button>5</button>
                  <button>6</button>
                  <button>+</button>
                  <button>1</button>
                  <button>2</button>
                  <button>3</button>
                  <button class="btn-igual">=</button>
                  <button class="btn-zero">0</button>
                  <button>.</button>
                  <button>,</button>
            </div>
        </div>
    </section>



</body>

</html>
